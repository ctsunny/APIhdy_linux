<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>🦊 狐蒂云极速秒杀系统 V5.0</title>
    <!-- URL 规范化：Vue Router 使用 '/' 作为基础路径，面板路径需在路由初始化前重置。
         目标地址硬编码为 '/'，不依赖任何用户输入，非跳转重定向。 -->
    <script>
      if (location.pathname !== '/') {
        history.replaceState(null, document.title, '/');
      }
    </script>
    <!-- 原始站点逻辑 -->
    <script type="module" crossorigin src="/assets/index-v5.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-v5.css">
    
    <!-- 4.0 增强型 UI 样式 -->
    <style>
      :root {
        --primary: #0284c7;
        --secondary: #3b82f6;
        --success: #10b981;
        --danger: #ef4444;
        --warning: #f59e0b;
        --bg-glass: rgba(255, 255, 255, 0.97);
        --border-glass: rgba(0, 0, 0, 0.1);
        --text-main: #0f172a;
        --text-muted: #64748b;
      }

      body {
        background: #f1f5f9; /* 亮色背景 */
        margin: 0; padding: 0;
      }

      /* 全局亮色模式覆盖 */
      .bg-slate-950 { background-color: #f1f5f9 !important; }
      .text-slate-100 { color: #0f172a !important; }
      .text-slate-200 { color: #1e293b !important; }
      .text-slate-300 { color: #334155 !important; }
      .text-slate-400 { color: #475569 !important; }
      .text-slate-500 { color: #64748b !important; }
      .text-white { color: #0f172a !important; }
      .text-white\/70 { color: #475569 !important; }
      .text-white\/80 { color: #334155 !important; }

      /* 卡片背景 */
      .bg-white\/5 { background-color: #ffffff !important; box-shadow: 0 1px 4px rgba(0,0,0,0.08) !important; }
      .bg-white\/10 { background-color: rgba(241,245,249,0.8) !important; }
      .bg-white\/15 { background-color: rgba(248,250,252,0.9) !important; }
      .bg-white\/20 { background-color: rgba(255,255,255,1) !important; }

      /* 边框 */
      .border-white\/5 { border-color: #f1f5f9 !important; }
      .border-white\/10 { border-color: #e2e8f0 !important; }
      .border-white\/15 { border-color: #cbd5e1 !important; }

      /* 深色背景卡片 */
      .bg-slate-900\/60, .bg-slate-900\/70, .bg-slate-900\/80 { background-color: #f8fafc !important; }
      .bg-slate-950\/80, .bg-slate-950\/95 { background-color: #f1f5f9 !important; }
      .bg-slate-800 { background-color: #e2e8f0 !important; }
      .bg-slate-700 { background-color: #cbd5e1 !important; }

      /* 遮罩层 */
      .bg-black\/70 { background-color: rgba(0,0,0,0.5) !important; }

      /* 日志卡片文字 */
      .text-slate-950 { color: #0f172a !important; }

      /* 加载中动画 */
      #v4-loader {
        position: fixed;
        inset: 0;
        background: #f1f5f9;
        z-index: 100001;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        transition: opacity 0.5s;
      }
      .loader-circle {
        width: 40px;
        height: 40px;
        border: 3px solid rgba(6, 182, 212, 0.1);
        border-top-color: var(--primary);
        border-radius: 50%;
        animation: spin 1s infinite linear;
      }
      .loader-text {
        margin-top: 20px;
        color: var(--primary);
        font-size: 14px;
        font-weight: 500;
        letter-spacing: 2px;
      }

      #ai-v4-panel {
        color: var(--text-main);
        font-family: 'Inter', -apple-system, sans-serif;
        user-select: none;
        overflow: hidden;
        border-radius: 24px;
        border: 1px solid rgba(0,0,0,0.08);
        background: var(--bg-glass);
        box-shadow: 0 1px 8px rgba(0,0,0,0.08);
        padding: 20px;
        margin-bottom: 16px;
      }

      #ai-v4-panel h3 {
        margin: 0 0 16px 0;
        font-size: 14px;
        font-weight: 800;
        color: var(--primary);
        display: flex;
        align-items: center;
        justify-content: space-between;
        letter-spacing: 0.5px;
      }

      /* 状态圆点动画 */
      .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        margin-right: 6px;
        display: inline-block;
      }
      .dot-idle { background: #64748b; }
      .dot-running { 
        background: var(--success);
        box-shadow: 0 0 8px var(--success);
        animation: pulse 1.5s infinite;
      }
      @keyframes pulse {
        0% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.5; transform: scale(1.2); }
        100% { opacity: 1; transform: scale(1); }
      }

      .ai-section {
        background: rgba(241, 245, 249, 0.8);
        border: 1px solid rgba(0, 0, 0, 0.07);
        border-radius: 16px;
        padding: 12px;
        margin-bottom: 12px;
        transition: border-color 0.3s;
      }
      .ai-section:hover { border-color: rgba(2, 132, 199, 0.3); }

      .ai-label {
        display: block;
        font-size: 10px;
        font-weight: 700;
        color: var(--text-muted);
        text-transform: uppercase;
        margin-bottom: 8px;
        letter-spacing: 1px;
      }

      .ai-input-group { display: flex; gap: 8px; margin-bottom: 8px; }
      
      .ai-input, .ai-select {
        flex: 1;
        background: #ffffff;
        border: 1px solid #e2e8f0;
        color: #0f172a;
        padding: 8px 12px;
        border-radius: 12px;
        font-size: 13px;
        outline: none;
        transition: all 0.2s;
      }
      .ai-input:focus { border-color: var(--primary); background: #f8fafc; }

      .ai-btn {
        flex: 1;
        padding: 8px 12px;
        border-radius: 12px;
        font-size: 12px;
        font-weight: 700;
        cursor: pointer;
        border: none;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
      }
      .ai-btn:active { transform: scale(0.95); }
      .btn-primary { background: var(--primary); color: #000; }
      .btn-ghost { background: rgba(0,0,0,0.05); color: #334155; border: 1px solid rgba(0,0,0,0.1); }
      .btn-ghost:hover { background: rgba(0,0,0,0.08); }
      .btn-danger { background: rgba(239, 68, 68, 0.15); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.2); }
      .btn-danger:hover { background: rgba(239, 68, 68, 0.25); }

      .toggle-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 4px 0;
      }
      /* Switch UI */
      .switch {
        position: relative;
        display: inline-block;
        width: 40px;
        height: 20px;
      }
      .switch input { opacity: 0; width: 0; height: 0; }
      .slider {
        position: absolute;
        cursor: pointer;
        top: 0; left: 0; right: 0; bottom: 0;
        background-color: #cbd5e1;
        transition: .4s;
        border-radius: 20px;
      }
      .slider:before {
        position: absolute;
        content: "";
        height: 14px; width: 14px;
        left: 3px; bottom: 3px;
        background-color: white;
        transition: .4s;
        border-radius: 50%;
      }
      input:checked + .slider { background-color: var(--primary); }
      input:checked + .slider:before { transform: translateX(20px); }

      #status-bar {
        font-size: 11px;
        text-align: center;
        padding-top: 10px;
        color: var(--text-muted);
        border-top: 1px solid rgba(0,0,0,0.07);
        margin-top: 16px;
      }
      .status-ok { color: var(--success); }
      .status-err { color: var(--danger); }

      /* 悬浮加载动画 */
      .ai-loading-mini {
        width: 12px;
        height: 12px;
        border: 2px solid rgba(0,0,0,0.1);
        border-top-color: var(--primary);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }

      #stop-loop-banner {
        display: none;
        background: linear-gradient(90deg, #991b1b, #ef4444);
        border-radius: 12px;
        padding: 12px;
        text-align: center;
        font-weight: 800;
        font-size: 13px;
        cursor: pointer;
        margin-top: 12px;
        animation: slideUp 0.3s ease-out;
      }
      @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    </style>
  </head>
  <body>
    <!-- 加载遮罩 -->
    <div id="v4-loader">
      <div class="loader-circle"></div>
      <div class="loader-text">FOX DI CLOUD NATIVE 5.0</div>
    </div>

    <div id="app"></div>

    <!-- 账号·通知·循环购买 (由 JS 注入主内容区) -->
    <div id="ai-v4-panel" style="display:none;">
      <h3>
        <span style="display:flex;align-items:center;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="margin-right:8px;">
            <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
          </svg>
          账号 · 通知 · 服务器抢购
        </span>
        <span id="v4-indicator" style="font-size:10px; opacity:0.8;">
          <span class="status-dot dot-idle"></span>待机
        </span>
      </h3>

      <!-- 账号体系 -->
      <div class="ai-section">
        <span class="ai-label">Account 🔐</span>
        <div class="ai-input-group">
          <select id="acc-list" class="ai-select">
            <option value="">快速切换账号</option>
          </select>
        </div>
        <div class="ai-input-group">
          <input type="text" id="user" class="ai-input" placeholder="手机号/邮箱">
        </div>
        <div class="ai-input-group">
          <input type="text" id="pass" class="ai-input" placeholder="API 密钥">
        </div>
        <div class="ai-input-group" style="margin-bottom:0;">
          <button id="btn-login" class="ai-btn btn-primary">快速登录</button>
          <button id="btn-save" class="ai-btn btn-ghost">保存</button>
        </div>
      </div>

      <!-- 通知 & 原始抢购托管 -->
      <div class="ai-section">
        <span class="ai-label">通知 & 原始抢购托管 ⚙</span>
        <div class="ai-input-group">
          <input type="text" id="qmsg-token" class="ai-input" placeholder="Qmsg酱 Token (通知)">
        </div>
        <div class="toggle-row">
          <span style="font-size:12px;color:var(--text-main);">点击原始“开始抢购”后自动转为服务器持续抢购</span>
          <label class="switch">
            <input type="checkbox" id="auto-loop-toggle">
            <span class="slider"></span>
          </label>
        </div>
        <div class="ai-input-group">
          <input type="number" id="server-interval" class="ai-input" placeholder="请求间隔秒数（默认 1）" min="0.2" step="0.1">
          <input type="number" id="server-max-count" class="ai-input" placeholder="成功次数上限（0=不限）" min="0" step="1">
        </div>
        <div class="ai-input-group" style="margin-bottom:8px;">
          <input type="number" id="server-timeout" class="ai-input" placeholder="任务超时秒数（0=不限）" min="0" step="1">
        </div>
        <div class="ai-input-group" style="margin-bottom:0;">
          <button id="btn-start-server" class="ai-btn btn-primary" style="display:none;">启动服务器任务</button>
          <button id="btn-stop-server" class="ai-btn btn-ghost">停止全部</button>
        </div>
      </div>

      <div class="ai-section">
        <span class="ai-label">服务器状态 📡</span>
        <div id="capture-summary" style="font-size:12px;color:var(--text-main);line-height:1.6;">
          尚未捕获原始抢购请求，请先点击页面原始“开始抢购”。
        </div>
        <div class="ai-input-group" style="margin-top:10px;margin-bottom:10px;">
          <button id="btn-refresh-server" class="ai-btn btn-ghost">刷新状态</button>
          <button id="btn-clear-finished" class="ai-btn btn-ghost">清除已完成</button>
        </div>
        <div id="task-list" style="display:flex;flex-direction:column;gap:8px;"></div>
      </div>

      <div id="status-bar">系统就绪</div>

      <div id="stop-loop-banner">
        ⏹ 停止全部服务器任务 (运行中 <span id="loop-count">0</span> 个)
      </div>
    </div>

    <script>
    (function () {
      const BASE = 'https://www.szhdy.com';
      const STORAGE_KEYS = {
        ACCOUNTS: 'ai_accounts',
        QMSG: 'ai_qmsg_token',
        REPEAT: 'ai_server_loop',
        INTERVAL: 'ai_server_interval',
        MAX_COUNT: 'ai_server_max_count',
        TIMEOUT: 'ai_server_timeout'
      };
      const MAX_STORED_CONFIGS = 20;
      const MIN_INTERVAL_SECONDS = 0.2;
      const POLL_INTERVAL_MS = 2000;
      const DEFAULT_CAPTURE_STATE = {
        configs: [],
        product: { name: '', price: '', cycle: '', status: 'idle' }
      };

      const originalFetch = window.fetch.bind(window);
      let captureState = { ...DEFAULT_CAPTURE_STATE };
      let taskState = [];
      let isCaptureSaving = false;
      let captureSavePending = false;
      let pollTimer = null;
      let pendingOriginalStart = false;
      let pendingOriginalStartTimer = null;
      let originalAutoStarting = false;

      window.onload = () => {
        const loader = document.getElementById('v4-loader');
        loader.style.opacity = '0';
        setTimeout(() => loader.remove(), 600);
      };

      function updateStatus(msg, type = '') {
        const el = document.getElementById('status-bar');
        el.textContent = msg;
        el.className = type ? 'status-' + type : '';
      }

      function setModuleState(state, runningCount = 0) {
        const ind = document.getElementById('v4-indicator');
        document.getElementById('loop-count').textContent = String(runningCount);
        if (state === 'running') {
          ind.innerHTML = '<span class="status-dot dot-running"></span>服务器运行中';
          document.getElementById('stop-loop-banner').style.display = 'block';
        } else {
          ind.innerHTML = '<span class="status-dot dot-idle"></span>待机';
          document.getElementById('stop-loop-banner').style.display = 'none';
        }
      }

      function escapeHtml(value) {
        return String(value == null ? '' : value)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function normalizeBody(body) {
        if (body == null) return '';
        if (typeof body === 'string') return body;
        if (body instanceof URLSearchParams) return body.toString();
        if (typeof FormData !== 'undefined' && body instanceof FormData) {
          return Array.from(body.entries())
            .map(([k, v]) => `${encodeURIComponent(k)}=${encodeURIComponent(v)}`)
            .join('&');
        }
        if (body instanceof Blob || body instanceof ArrayBuffer) return '';
        if (ArrayBuffer.isView(body)) return '';
        try {
          return JSON.stringify(body);
        } catch (e) {
          return '';
        }
      }

      function normalizeHeaders(headers) {
        const out = {};
        if (!headers) return out;
        const append = (key, value) => {
          if (!key) return;
          const lower = String(key).trim().toLowerCase();
          if (!lower || ['content-length', 'host', 'origin', 'referer', 'cookie', 'connection'].includes(lower)) return;
          if (lower.startsWith('sec-')) return;
          out[String(key)] = String(value == null ? '' : value);
        };
        if (typeof Headers !== 'undefined' && headers instanceof Headers) {
          headers.forEach((value, key) => append(key, value));
          return out;
        }
        if (Array.isArray(headers)) {
          headers.forEach(([key, value]) => append(key, value));
          return out;
        }
        Object.keys(headers).forEach((key) => append(key, headers[key]));
        return out;
      }

      function normalizeTargetUrl(url) {
        const raw = String(url || '').trim();
        if (!raw) return '';
        try {
          const resolved = new URL(raw, BASE);
          if (resolved.origin === window.location.origin && resolved.pathname.startsWith('/cart/')) {
            return new URL(resolved.pathname + resolved.search, BASE).href;
          }
          if (!/^https?:\/\//i.test(raw) && raw.startsWith('/')) {
            return new URL(raw, BASE).href;
          }
          return resolved.href;
        } catch (e) {
          return raw.startsWith('/') ? (BASE + raw) : raw;
        }
      }

      function isPurchaseUrl(url) {
        const normalized = normalizeTargetUrl(url);
        return normalized.includes('/cart/settle');
      }

      function getProductSnapshot() {
        const title = document.title.replace(/^🦊\s*/, '').trim();
        const product = captureState.product || DEFAULT_CAPTURE_STATE.product;
        return {
          name: title || product.name || '',
          price: product.price || '',
          cycle: document.getElementById('auto-loop-toggle')?.checked ? '服务器循环' : '单次/有限次数',
          status: product.status || 'idle'
        };
      }

      function compareTaskStartTime(a, b) {
        return String(b.start_time || '').localeCompare(String(a.start_time || ''));
      }

      function getRequestSignature(config) {
        return `${config.method}|${config.url}|${config.body}`;
      }

      function getInputNumberValue(elementId, defaultValue) {
        const raw = document.getElementById(elementId).value || String(defaultValue);
        const parsed = defaultValue % 1 === 0 ? parseInt(raw, 10) : parseFloat(raw);
        return Number.isFinite(parsed) ? parsed : defaultValue;
      }

      async function apiFetch(path, options = {}) {
        const response = await originalFetch(path, {
          credentials: 'same-origin',
          ...options,
          headers: {
            'Content-Type': 'application/json',
            ...(options.headers || {})
          }
        });
        const data = await response.json().catch(() => ({}));
        if (!response.ok || data.code === 0) {
          throw new Error(data.msg || `HTTP ${response.status}`);
        }
        return data;
      }

      function renderCaptureState() {
        const configs = Array.isArray(captureState.configs) ? captureState.configs : [];
        const product = captureState.product || DEFAULT_CAPTURE_STATE.product;
        const lines = [
          `已记录 <b>${configs.length}</b> 个原始抢购 PID`,
          product.name ? `商品：${escapeHtml(product.name)}` : '商品：等待页面捕获',
          captureState.updated_at ? `最近同步：${escapeHtml(captureState.updated_at)}` : '最近同步：暂无'
        ];
        if (!configs.length) {
          lines.push('请点击页面原始“开始抢购”，系统会自动抓取请求并立即转为服务器任务。');
        } else {
          const previewItems = configs.slice(-3);
          const previewStart = configs.length - previewItems.length + 1;
          const preview = previewItems.map((cfg, index) => {
            const label = `PID ${previewStart + index}`;
            return `${label}：${escapeHtml(cfg.method || 'POST')} ${escapeHtml((cfg.url || '').replace(BASE, ''))}`;
          });
          lines.push(preview.join('<br>'));
        }
        document.getElementById('capture-summary').innerHTML = lines.join('<br>');
      }

      function renderTaskList() {
        const wrap = document.getElementById('task-list');
        const tasks = Array.isArray(taskState) ? taskState.slice().sort(compareTaskStartTime) : [];
        if (!tasks.length) {
          wrap.innerHTML = '<div style="font-size:12px;color:var(--text-main);padding:10px 12px;border-radius:10px;background:rgba(255,255,255,0.04);">暂无服务器任务；点击页面原始“开始抢购”后会自动在服务器接管。</div>';
          return;
        }
        wrap.innerHTML = tasks.map((task) => {
          const logs = Array.isArray(task.logs) ? task.logs.slice(-3) : [];
          const statusText = ({
            running: '运行中',
            stopped: '已停止',
            success: '已完成',
            error: '错误',
            timeout: '超时'
          })[task.status] || task.status || '未知';
          return `
            <div style="padding:10px 12px;border-radius:12px;background:rgba(255,255,255,0.05);font-size:12px;line-height:1.6;">
              <div style="display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap;">
                <b>任务 ${escapeHtml(task.id || 'N/A')}</b>
                <span>${escapeHtml(statusText)}</span>
              </div>
              <div>成功次数：${escapeHtml(task.count || 0)} ｜ PID：${escapeHtml(task.current_pid || 1)}/${escapeHtml(task.pid_count || 1)}</div>
              <div>开始时间：${escapeHtml(task.start_time || '-')}</div>
              <div>最近单号：${escapeHtml(task.last_order || '-')}</div>
              ${logs.length ? `<div style="margin-top:6px;color:var(--text-main);">${logs.map(escapeHtml).join('<br>')}</div>` : ''}
            </div>
          `;
        }).join('');
      }

      function syncModuleStateFromTasks() {
        const running = Array.isArray(taskState) ? taskState.filter((task) => task.status === 'running') : [];
        setModuleState(running.length ? 'running' : 'idle', running.length);
      }

      async function saveCaptureState() {
        if (isCaptureSaving) {
          captureSavePending = true;
          return;
        }
        isCaptureSaving = true;
        try {
          const payload = {
            ...captureState,
            product: {
              ...getProductSnapshot(),
              status: (taskState.some((task) => task.status === 'running') ? 'running' : 'idle')
            }
          };
          const result = await apiFetch('/api/capture', {
            method: 'POST',
            body: JSON.stringify(payload)
          });
          captureState = result.data || payload;
          renderCaptureState();
        } catch (e) {
          updateStatus('服务器同步失败: ' + e.message, 'err');
        } finally {
          isCaptureSaving = false;
          if (captureSavePending) {
            captureSavePending = false;
            saveCaptureState();
          }
        }
      }

      function capturePurchaseRequest(req) {
        if (!req || !isPurchaseUrl(req.url)) return;
        const normalized = {
          url: normalizeTargetUrl(req.url),
          method: String(req.method || 'POST').toUpperCase(),
          headers: normalizeHeaders(req.headers),
          body: normalizeBody(req.body)
        };
        if (!normalized.url) return;
        const list = Array.isArray(captureState.configs) ? captureState.configs.slice() : [];
        const signature = getRequestSignature(normalized);
        if (list.some((item) => getRequestSignature(item) === signature)) return;
        list.push(normalized);
        captureState = {
          ...captureState,
          configs: list.slice(-MAX_STORED_CONFIGS),
          product: getProductSnapshot(),
          updated_at: new Date().toLocaleString()
        };
        renderCaptureState();
        updateStatus(`已捕获原始抢购请求，当前共 ${captureState.configs.length} 个 PID`, 'ok');
        saveCaptureState();
        autoStartOriginalServerTask(normalized);
      }

      async function refreshServerState(showMessage = false) {
        const [captureRes, taskRes] = await Promise.all([
          apiFetch('/api/capture'),
          apiFetch('/api/task/status')
        ]);
        captureState = captureRes.data || { ...DEFAULT_CAPTURE_STATE };
        taskState = Array.isArray(taskRes.data) ? taskRes.data : [];
        renderCaptureState();
        renderTaskList();
        syncModuleStateFromTasks();
        if (showMessage) {
          updateStatus('服务器状态已刷新', 'ok');
        }
      }

      function getServerTaskPayload(configsOverride) {
        const interval = getInputNumberValue('server-interval', 1);
        const maxCount = getInputNumberValue('server-max-count', 0);
        const timeout = getInputNumberValue('server-timeout', 0);
        return {
          configs: Array.isArray(configsOverride) ? configsOverride : (Array.isArray(captureState.configs) ? captureState.configs : []),
          interval: Math.max(MIN_INTERVAL_SECONDS, interval),
          max_count: Math.max(0, maxCount),
          timeout: Math.max(0, timeout),
          loop: document.getElementById('auto-loop-toggle').checked
        };
      }

      async function startServerTask(options = {}) {
        const { configs, source = 'panel' } = options;
        const running = taskState.filter((task) => task.status === 'running');
        if (running.length) {
          updateStatus(
            source === 'original'
              ? '服务器任务已在运行，本次原始抢购不会重复创建'
              : '已有服务器任务在运行，请先停止后再启动',
            source === 'original' ? 'ok' : 'err'
          );
          return false;
        }
        const payload = getServerTaskPayload(configs);
        if (!payload.configs.length) {
          updateStatus(
            source === 'original'
              ? '未捕获到原始抢购请求，请重试'
              : '请先在页面内触发一次抢购请求，捕获 PID 后再启动',
            'err'
          );
          return false;
        }
        const result = await apiFetch('/api/task/start', {
          method: 'POST',
          body: JSON.stringify(payload)
        });
        updateStatus(
          source === 'original'
            ? `原始抢购已转为服务器运行：${result.task_id}`
            : `服务器任务已启动：${result.task_id}`,
          'ok'
        );
        await refreshServerState();
        return true;
      }

      function clearPendingOriginalStart() {
        pendingOriginalStart = false;
        if (pendingOriginalStartTimer) {
          clearTimeout(pendingOriginalStartTimer);
          pendingOriginalStartTimer = null;
        }
      }

      function armOriginalServerStart() {
        clearPendingOriginalStart();
        pendingOriginalStart = true;
        pendingOriginalStartTimer = setTimeout(() => {
          if (!pendingOriginalStart) return;
          pendingOriginalStart = false;
          updateStatus('未捕获到“原始抢购”请求，请重新点击“开始抢购”', 'err');
        }, 8000);
        updateStatus('已接管原始抢购，正在同步到服务器...', 'ok');
      }

      async function autoStartOriginalServerTask(config) {
        if (!pendingOriginalStart || originalAutoStarting) return;
        clearPendingOriginalStart();
        originalAutoStarting = true;
        try {
          await startServerTask({ configs: [config], source: 'original' });
        } catch (e) {
          updateStatus('原始抢购转服务器失败：' + e.message, 'err');
        } finally {
          originalAutoStarting = false;
        }
      }

      async function stopAllServerTasks(showMessage = true) {
        await apiFetch('/api/task/stop', {
          method: 'POST',
          body: JSON.stringify({ task_id: '' })
        });
        if (showMessage) {
          updateStatus('已发送停止全部服务器任务指令', 'ok');
        }
        await refreshServerState();
      }

      async function clearFinishedTasks() {
        const result = await apiFetch('/api/task/clear', {
          method: 'POST',
          body: JSON.stringify({})
        });
        updateStatus(result.msg || '已清理完成任务', 'ok');
        await refreshServerState();
      }

      function onOrderSuccess(invId) {
        updateStatus(`浏览器请求成功，单号：${invId || 'OK'}；后台任务可继续独立运行`, 'ok');
        const token = localStorage.getItem(STORAGE_KEYS.QMSG);
        if (token) {
          const msg = `✅ 秒杀成功！\n⏰ ${new Date().toLocaleTimeString()}\n🔖 单号：${invId || 'N/A'}`;
          originalFetch(`https://qmsg.zendee.cn/send/${token}`, {
            method: 'POST',
            body: 'msg=' + encodeURIComponent(msg),
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
          }).catch(() => {});
        }
      }

      window.fetch = function (url, options) {
        const reqUrl = typeof url === 'string' ? url : (url && url.url) || '';
        if (typeof reqUrl === 'string' && (reqUrl.includes('/api_dummy_safe') || reqUrl.includes('/order/data.php'))) {
          return Promise.resolve(new Response(JSON.stringify({ code: 1, status: 200, msg: 'Safe Mode' }), {
            status: 200, headers: { 'Content-Type': 'application/json' }
          }));
        }
        const reqInfo = {
          url: reqUrl,
          method: (options && options.method) || 'GET',
          headers: normalizeHeaders(options && options.headers),
          body: options && options.body
        };
        const shouldWatch = isPurchaseUrl(reqInfo.url);
        if (shouldWatch) capturePurchaseRequest(reqInfo);
        return originalFetch.apply(this, arguments).then((response) => {
          if (shouldWatch) {
            response.clone().json().then((data) => {
              if (data && (data.status === 200 || data.status === '200')) {
                onOrderSuccess(data.data && data.data.invoiceid);
              }
            }).catch((error) => console.debug('capture fetch parse failed', error));
          }
          return response;
        });
      };

      const XHR = XMLHttpRequest.prototype;
      const oOpen = XHR.open;
      const oSend = XHR.send;
      const oSetHeader = XHR.setRequestHeader;

      XHR.open = function(method, url) {
        this._apihdyReq = {
          method: String(method || 'GET').toUpperCase(),
          url,
          headers: {}
        };
        return oOpen.apply(this, arguments);
      };

      XHR.setRequestHeader = function(name, value) {
        if (this._apihdyReq) {
          this._apihdyReq.headers[name] = value;
        }
        return oSetHeader.apply(this, arguments);
      };

      XHR.send = function(body) {
        if (this._apihdyReq) {
          this._apihdyReq.body = body;
          capturePurchaseRequest(this._apihdyReq);
        }
        if (this._apihdyReq && isPurchaseUrl(this._apihdyReq.url)) {
          this.addEventListener('load', () => {
            try {
              const res = JSON.parse(this.responseText);
              if (res.status == 200 || res.status === '200') {
                onOrderSuccess(res.data?.invoiceid);
              }
            } catch(e){}
          });
        }
        return oSend.apply(this, arguments);
      };

      function injectPanelIntoMain() {
        const panel = document.getElementById('ai-v4-panel');
        if (!panel) return;
        const container =
          document.querySelector('[class*="max-w-\\[800px\\]"]') ||
          document.querySelector('[class*="space-y-4"]') ||
          document.querySelector('#app > div > div');
        if (container) {
          panel.style.display = '';
          container.insertBefore(panel, container.firstChild);
          return true;
        }
        return false;
      }

      const _mo = new MutationObserver(() => {
        if (injectPanelIntoMain()) _mo.disconnect();
      });
      _mo.observe(document.getElementById('app'), { childList: true, subtree: true });

      window.addEventListener('DOMContentLoaded', () => {
        const accounts = JSON.parse(localStorage.getItem(STORAGE_KEYS.ACCOUNTS) || '{}');
        const sel = document.getElementById('acc-list');
        const updateAccSelect = () => {
          sel.innerHTML = '<option value="">快速切换账号</option>';
          Object.keys(accounts).forEach(u => {
            const op = new Option(u, u); sel.add(op);
          });
        };
        updateAccSelect();

        sel.onchange = () => {
          if (sel.value) {
            document.getElementById('user').value = sel.value;
            document.getElementById('pass').value = accounts[sel.value];
          }
        };

        document.getElementById('btn-save').onclick = () => {
          const u = document.getElementById('user').value.trim();
          const p = document.getElementById('pass').value.trim();
          if (u && p) {
            accounts[u] = p;
            localStorage.setItem(STORAGE_KEYS.ACCOUNTS, JSON.stringify(accounts));
            updateAccSelect();
            updateStatus('账号已保存', 'ok');
          }
        };

        document.getElementById('btn-login').onclick = async () => {
          const u = document.getElementById('user').value.trim();
          const p = document.getElementById('pass').value.trim();
          if (!u || !p) return updateStatus('请输入完整信息', 'err');
          
          updateStatus('正在通过原生代理验证...', 'ok');
          document.getElementById('btn-login').disabled = true;
          document.getElementById('btn-login').innerHTML = '<div class="ai-loading-mini"></div> 验证中';

          try {
            // 使用 v4.2 原生代理
            const r = await originalFetch('/local_proxy_login', {
              method: 'POST', 
              body: JSON.stringify({username: u, password: p}),
              headers: {'Content-Type': 'application/json'}
            });
            const d = await r.json();
            if (d.status == 200 || d.status === '200') {
              updateStatus('✔ 登录成功，系统即将重启', 'ok');
              setTimeout(() => location.reload(), 1000);
            } else {
              updateStatus('❌ 登录失败: ' + (d.msg || '凭据错误'), 'err');
              document.getElementById('btn-login').disabled = false;
              document.getElementById('btn-login').innerHTML = '快速登录';
            }
          } catch(e) { 
            updateStatus('❌ 代理通讯失败: ' + e.message, 'err'); 
            document.getElementById('btn-login').disabled = false;
            document.getElementById('btn-login').innerHTML = '快速登录';
          }
        };

        document.getElementById('qmsg-token').value = localStorage.getItem(STORAGE_KEYS.QMSG) || '';
        document.getElementById('qmsg-token').oninput = (e) => localStorage.setItem(STORAGE_KEYS.QMSG, e.target.value);

        const repeatToggle = document.getElementById('auto-loop-toggle');
        repeatToggle.checked = localStorage.getItem(STORAGE_KEYS.REPEAT) === 'true';
        repeatToggle.onchange = (e) => localStorage.setItem(STORAGE_KEYS.REPEAT, e.target.checked);

        const intervalInput = document.getElementById('server-interval');
        const maxCountInput = document.getElementById('server-max-count');
        const timeoutInput = document.getElementById('server-timeout');
        intervalInput.min = String(MIN_INTERVAL_SECONDS);
        intervalInput.value = localStorage.getItem(STORAGE_KEYS.INTERVAL) || '1';
        maxCountInput.value = localStorage.getItem(STORAGE_KEYS.MAX_COUNT) || '0';
        timeoutInput.value = localStorage.getItem(STORAGE_KEYS.TIMEOUT) || '0';
        intervalInput.oninput = (e) => localStorage.setItem(STORAGE_KEYS.INTERVAL, e.target.value || '1');
        maxCountInput.oninput = (e) => localStorage.setItem(STORAGE_KEYS.MAX_COUNT, e.target.value || '0');
        timeoutInput.oninput = (e) => localStorage.setItem(STORAGE_KEYS.TIMEOUT, e.target.value || '0');

        document.getElementById('btn-start-server').onclick = async () => {
          try {
            await startServerTask();
          } catch (e) {
            updateStatus('启动失败: ' + e.message, 'err');
          }
        };
        document.getElementById('btn-stop-server').onclick = async () => {
          try {
            await stopAllServerTasks();
          } catch (e) {
            updateStatus('停止失败: ' + e.message, 'err');
          }
        };
        document.getElementById('btn-refresh-server').onclick = async () => {
          try {
            await refreshServerState(true);
          } catch (e) {
            updateStatus('刷新失败: ' + e.message, 'err');
          }
        };
        document.getElementById('btn-clear-finished').onclick = async () => {
          try {
            await clearFinishedTasks();
          } catch (e) {
            updateStatus('清理失败: ' + e.message, 'err');
          }
        };
        document.getElementById('stop-loop-banner').onclick = async () => {
          try {
            await stopAllServerTasks();
          } catch (e) {
            updateStatus('停止失败: ' + e.message, 'err');
          }
        };
        document.addEventListener('click', (event) => {
          const button = event.target && typeof event.target.closest === 'function'
            ? event.target.closest('button')
            : null;
          if (!button) return;
          if ([
            'btn-start-server',
            'btn-stop-server',
            'btn-refresh-server',
            'btn-clear-finished',
            'btn-login',
            'btn-save'
          ].includes(button.id)) return;
          const text = String(button.innerText || button.textContent || '').replace(/\s+/g, '');
          if (text.includes('开始抢购')) {
            armOriginalServerStart();
          }
        });

        refreshServerState(true).catch((e) => updateStatus('读取服务器状态失败: ' + e.message, 'err'));
        pollTimer = setInterval(() => {
          refreshServerState(false).catch(() => {});
        }, POLL_INTERVAL_MS);

        console.log('%c APIhdy V5 Supreme Loaded ', 'background: #06b6d4; color: #000; font-weight: bold;');
      });
    })();
    </script>
  </body>
